<app-psw-nav></app-psw-nav>

<div class="profile-container">
  <div class="profile-card">
    <div class="profile-content">
      <!-- Profile Picture -->
      <div class="profile-picture">
        <img *ngIf="profile.profileImage; else initialsTpl" [src]="profile.profileImage" [alt]="profile.name" class="profile-img">
        <ng-template #initialsTpl>
          <div class="initials">
            {{ getInitials(profile.name || 'P S') }}
          </div>
        </ng-template>
        <div class="change-photo">
          <input type="file" #photoInput hidden (change)="onPhotoSelected($event)">
          <button type="button" (click)="photoInput.click()">
            <i class="fas fa-camera"></i> Change photo
          </button>
        </div>
      </div>

      <!-- Profile Info -->
      <div class="profile-info">
        <h1 class="profile-name">{{ profile.name || 'Profile' }}</h1>
        
        <div class="info-section">
          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <span>{{ profile.email }}</span>
          </div>
          
          <div class="info-item">
            <i class="fas fa-phone"></i>
            <span>{{ profile.phone }}</span>
          </div>
          
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>{{ profile.location || 'N/A' }}</span>
          </div>
          
          <div class="info-item">
            <i class="far fa-calendar-alt"></i>
            <span>Member since: {{ profile.joinDate || 'N/A' }}</span>
          </div>
        </div>

        <!-- Edit Button -->
        <button class="edit-button">
          <i class="fas fa-edit"></i>
          Edit Profile
        </button>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
